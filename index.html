<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Translation Tool</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: white;
            padding: 25px;
            width: 320px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        textarea {
            width: calc(100% - 22px);
            height: 100px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
            font-size: 15px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            gap: 10px;
        }

        select {
            width: 48%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border: none;
            background: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .output {
            margin-top: 20px;
            width: calc(100% - 24px);
            padding: 12px;
            background: #f1f1f1;
            border-radius: 8px;
            min-height: 60px;
        }

        .copy-btn {
            background: #28a745;
        }

        .copy-btn:hover {
            background: #1e7e34;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🌍 Language Translation Tool</h2>

    <textarea id="inputText" placeholder="Enter text here..."></textarea>

    <div class="row">
        <select id="sourceLang">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="mr">Marathi</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
        </select>

        <select id="targetLang">
            <option value="hi">Hindi</option>
            <option value="en">English</option>
            <option value="mr">Marathi</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
        </select>
    </div>

    <button onclick="translateText()">Translate</button>

    <div class="output" id="translatedText">
        Translated text will appear here...
    </div>

    <button class="copy-btn" onclick="copyText()">Copy Translation</button>
</div>

<script>
    async function translateText() {
        const text = document.getElementById("inputText").value;
        const sourceLang = document.getElementById("sourceLang").value;
        const targetLang = document.getElementById("targetLang").value;

        if (text.trim() === "") {
            alert("Please enter some text.");
            return;
        }

        const url = "https://libretranslate.de/translate";

        const response = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                q: text,
                source: sourceLang,
                target: targetLang,
                format: "text"
            })
        });

        const data = await response.json();

        document.getElementById("translatedText").innerText = data.translatedText;
    }

    function copyText() {
        const translated = document.getElementById("translatedText").innerText;
        navigator.clipboard.writeText(translated);
        alert("Translated text copied!");
    }
</script>

</body>
</html>
